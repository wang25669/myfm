<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 针对老式移动端优化的 viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyFM - 私人电台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 顶部导航/功能按钮 -->
        <div class="header-btns-bar">
            <button id="dailyBtn" class="btn btn-nav">日推</button>
            <button id="fmBtn" class="btn btn-nav">私人FM</button>
            <button id="hotBtn" class="btn btn-nav">热歌榜</button>
            <button id="toggleLoginBtn" class="btn btn-nav">登录</button>
            <button id="refreshBtn" class="btn btn-nav refresh-nav">刷新</button>
        </div>

        <!-- 登录面板 -->
        <div id="loginPanel" class="panel">
            <div class="login-box">
                <div class="input-group">
                    <input type="tel" id="phoneInput" placeholder="请输入手机号" maxlength="11">
                </div>
                <div class="input-group captcha-group">
                    <input type="text" id="captchaInput" placeholder="验证码" maxlength="4">
                    <button id="sendCaptchaBtn" class="btn btn-secondary">获取验证码</button>
                </div>
                <button id="loginBtn" class="btn btn-primary">登 录</button>
                <div id="loginMessage" class="message"></div>
            </div>
        </div>

        <!-- 歌曲列表面板 -->
        <div id="songsPanel" class="panel">
            <div id="loadingIndicator" class="loading" style="display: none;">
                正在获取推荐歌曲...
            </div>
            
            <ul id="songList" class="song-list">
                <!-- 歌曲列表将通过 JS 动态生成 -->
            </ul>
        </div>
        
        <!-- 底部播放控制器 -->
        <div id="player" class="player-bar" style="display: none;">
            <div class="player-info">
                <img src="img/default_cover.png" id="playerCover" class="cover" alt="封面">
                <div class="track-info">
                    <div id="playerName" class="track-name">MyFM</div>
                    <div id="playerArtist" class="track-artist">探索好音乐</div>
                </div>
            </div>
            <div class="player-controls">
                <div class="player-controls-inner">
                    <button id="prevBtn" class="control-btn">⏮</button>
                    <button id="playPauseBtn" class="control-btn play-btn">▶</button>
                    <button id="nextBtn" class="control-btn">⏭</button>
                </div>
            </div>
            
            <!-- 隐藏的音频元素 -->
            <audio id="audioPlayer" style="display: none;"></audio>
        </div>
    </div>
    
    <!-- 为了兼容老式浏览器，我们将所有的 JS 写成 ES5 标准 -->
    <script src="js/app.js?v=1.2"></script>
</body>
</html>
