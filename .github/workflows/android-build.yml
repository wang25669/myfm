name: Build and Release Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - 'AndroidApp/**'
      - '.github/workflows/android-build.yml'
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: sdkmanager "platforms;android-33" "build-tools;33.0.2"

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x AndroidApp/gradlew

      - name: Build debug APK
        run: cd AndroidApp && ./gradlew :app:assembleDebug --no-daemon

      - name: Rename APK
        run: mv AndroidApp/app/build/outputs/apk/debug/app-debug.apk AndroidApp/app/build/outputs/apk/debug/MyFM-debug.apk

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.date.outputs.date }}
          name: Auto Build ${{ steps.date.outputs.date }}
          draft: false
          prerelease: false
          files: |
            AndroidApp/app/build/outputs/apk/debug/MyFM-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
